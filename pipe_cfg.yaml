chunk:
  max_chars: 800
  overlap: 60
embed:
  model: qwen3-embedding:4b
  dim: 2560
  ollama_url: http://localhost:11434
search:
  top_k: 5
  score_threshold: 0.3
  rerank:
    enabled: true
    model: qwen3-embedding:4b
    top_n: 20
ingest:
  skip_duplicates: true
confidence:
  low: 0.4
  high: 0.75
table_split_threshold: 4
watch:
  poll_interval: 1.0
  write_complete_checks: 2
  write_check_interval: 0.5
  max_file_size_mb: 50
  processing_timeout: 600
  dlq_max_size_mb: 500
  dlq_ttl_days: 30
  processed_ttl_days: 30
  staging_ttl_days: 7
  infra_retry_interval: 30
  queue_max_size: 100
  temp_patterns:
  - ~$*
  - '*.tmp'
  - '*.part'
  - '*.crdownload'
  - thumbs.db
  - desktop.ini
watch_v2:
  inbox_dir: data/inbox
  state_file: data/file_state.jsonl
  write_complete_checks: 2
  write_check_interval: 0.5
  max_file_size_mb: 50
  processing_timeout: 600
  queue_max_size: 100
  queue_put_timeout: 0.5
  retention:
    text_density_threshold: 0.3
    ocr_conf_threshold: 0.7
  failure_strategies:
    max_auto_retries: 3
    auto_retry_delay: 5
    dlq_ttl_days: 30
    notify_on_fatal: true
  temp_patterns:
  - ~$*
  - '*.tmp'
  - '*.part'
  - '*.crdownload'
  - thumbs.db
  - desktop.ini
  cleanup_interval: 300
  infra_retry_interval: 15
